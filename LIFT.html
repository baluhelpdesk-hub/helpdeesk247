<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#080808"/>
<title>LIFT — Fitness Coach</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{width:100%;height:100%;overflow:hidden;background:#080808}
body{font-family:'Space Grotesk',sans-serif;overscroll-behavior:none}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:0;height:0}
select{-webkit-appearance:none;appearance:none}
input,select,button{font-family:'Space Grotesk',sans-serif}
/* Safe area insets for iPhone notch */
.safe-top{padding-top:env(safe-area-inset-top,0px)}
.safe-bottom{padding-bottom:max(env(safe-area-inset-bottom,0px),12px)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.screen-enter{animation:fadeUp 0.22s cubic-bezier(0.22,1,0.36,1)}
.modal-enter{animation:slideUp 0.28s cubic-bezier(0.22,1,0.36,1)}
.fade-enter{animation:fadeIn 0.18s ease-out}

</style>
